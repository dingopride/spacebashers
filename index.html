<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceBashers</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}
canvas {
  image-rendering: pixelated;
  border: 1px solid #333;
}
#sdp-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 10;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  color: #00ff00;
}
#sdp-overlay.active { display: flex; }
#sdp-overlay h2 { margin-bottom: 12px; font-size: 18px; }
#sdp-overlay p { color: #888; margin-bottom: 8px; font-size: 13px; max-width: 500px; text-align: center; }
#sdp-overlay textarea {
  width: 460px; height: 80px;
  background: #111; color: #0f0; border: 1px solid #333;
  font-family: 'Courier New', monospace; font-size: 11px;
  padding: 6px; margin: 4px 0; resize: none;
}
#sdp-overlay button {
  background: #222; color: #0f0; border: 1px solid #0f0;
  padding: 8px 24px; margin: 6px;
  font-family: 'Courier New', monospace; font-size: 14px; cursor: pointer;
}
#sdp-overlay button:hover { background: #0f0; color: #000; }
#sdp-overlay .status { color: #cc0; margin-top: 8px; font-size: 13px; }
#sdp-overlay .error { color: #f33; }
#sdp-overlay .row { display: flex; gap: 8px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="sdp-overlay">
  <h2 id="sdp-title">Network Game</h2>
  <p id="sdp-desc"></p>
  <textarea id="sdp-out" readonly placeholder="Your code will appear here..."></textarea>
  <div class="row">
    <button id="sdp-copy" onclick="copyCode()">Copy Code</button>
  </div>
  <p id="sdp-paste-label" style="margin-top:12px"></p>
  <textarea id="sdp-in" placeholder="Paste code here..."></textarea>
  <div class="row">
    <button id="sdp-connect" onclick="submitCode()">Connect</button>
    <button id="sdp-cancel" onclick="cancelNet()">Cancel</button>
  </div>
  <div class="status" id="sdp-status"></div>
</div>
<script>
"use strict";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// --- Layout ---
const COLS = 100;
const ROWS = 45;
const CELL_W = 10;
const CELL_H = 16;
canvas.width = COLS * CELL_W;
canvas.height = ROWS * CELL_H;

function fitCanvas() {
  const scale = Math.min(window.innerWidth / canvas.width, window.innerHeight / canvas.height, 1);
  canvas.style.width = (canvas.width * scale) + "px";
  canvas.style.height = (canvas.height * scale) + "px";
}
fitCanvas();
window.addEventListener("resize", fitCanvas);

// --- Colors ---
const C = {
  bg: "#000000",
  green: "#00ff00",
  white: "#ffffff",
  cyan: "#00dddd",
  yellow: "#dddd00",
  red: "#ff3333",
  magenta: "#ff44ff",
  orange: "#ff8800",
  blue: "#4488ff",
  dim: "#555555",
};

// Player colors and config
const PLAYER_CONFIGS = [
  { name: "P1", color: C.green,   ship: " /^\\ ", left: "KeyA",       right: "KeyD",       fire: "KeyW"    },
  { name: "P2", color: C.cyan,    ship: " /^\\ ", left: "ArrowLeft",  right: "ArrowRight", fire: "ArrowUp" },
  { name: "P3", color: C.orange,  ship: " /^\\ ", left: "KeyJ",       right: "KeyL",       fire: "KeyI"    },
  { name: "P4", color: C.magenta, ship: " /^\\ ", left: "Numpad4",    right: "Numpad6",    fire: "Numpad8" },
];
const SHIP_W = 5;

// --- Sound Engine ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let soundEnabled = true;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function playTone(freq, duration, vol = 0.15, type = "square", decay = true) {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = vol;
  if (decay) gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playNoise(duration, vol = 0.1) {
  if (!soundEnabled || !audioCtx) return;
  const bufSize = audioCtx.sampleRate * duration;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  src.buffer = buf;
  gain.gain.value = vol;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

const sfx = {
  shoot() { playTone(880, 0.06, 0.07); },
  kill(pitch) { playTone(400 + pitch * 100, 0.05, 0.09, "square", false); setTimeout(() => playNoise(0.04, 0.07), 40); },
  playerHit() { playNoise(0.2, 0.12); playTone(100, 0.2, 0.08, "sawtooth"); },
  bonusDrop() { playTone(1200, 0.08, 0.06, "sine"); },
  bonusGrab() { [523,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.06, 0.08, "square"), i*50)); },
  waveStart() { [262,330,392,523].forEach((f,i) => setTimeout(() => playTone(f, 0.08, 0.1, "square", i===3), i*80)); },
  roundEnd() { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, i===3?0.3:0.1, 0.12, "square", i===3), i*100)); },
  countdown() { playTone(440, 0.15, 0.1, "square"); },
  countdownGo() { playTone(880, 0.3, 0.12, "square"); },
  steal() { playTone(200, 0.1, 0.08, "sawtooth"); playTone(150, 0.1, 0.06, "sawtooth"); },
};

// --- Text Drawing ---
function drawText(text, col, row, color = C.white, bold = false) {
  ctx.fillStyle = color;
  ctx.font = (bold ? "bold " : "") + "14px 'Courier New', monospace";
  ctx.fillText(text, col * CELL_W, row * CELL_H + 12);
}

function drawTextCentered(text, row, color = C.white, bold = false) {
  drawText(text, Math.floor((COLS - text.length) / 2), row, color, bold);
}

function drawRect(col, row, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(col * CELL_W, row * CELL_H, w * CELL_W, h * CELL_H);
}

// --- Input ---
const keys = {};
const justPressed = {};
document.addEventListener("keydown", e => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  if (["Space","ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Numpad4","Numpad6","Numpad8"].includes(e.code)) e.preventDefault();
});
document.addEventListener("keyup", e => { keys[e.code] = false; });

function consumePress(code) { if (justPressed[code]) { justPressed[code] = false; return true; } return false; }
function clearPresses() { for (const k in justPressed) justPressed[k] = false; }

function now() { return performance.now() / 1000; }

// --- Invader Sprites ---
const SPRITES_POOL = ["(@@)", "<**>", "/\\/\\", "{##}", "[@@]", "<==>", "(##)", "<@@>"];
const INV_W = 4;

// --- Game Modes ---
let state = "title";
let numPlayers = 2;
let soloScheme = 0;
let enemyBullets = [];
let lastEnemyShot = 0;
let enemyShotInterval = 1.0;

// --- Network state ---
let netMode = null;          // null | "host" | "client"
let netPeers = [];           // DataChannels (host has multiple, client has one)
let netPc = null;            // RTCPeerConnection (client only uses one)
let netHostPcs = [];         // host: array of {pc, dc, id, ready}
let netMyId = 0;
let netRemoteInputs = {};    // host: {playerId: {l,r,f}}
let netLatestSnap = null;    // client: latest state from host
let netLobbyNames = [];
let netConnectedCount = 0;
let netSnapInterval = null;
let players = [];
let bullets = [];           // { x, y, owner, color }
let invaders = [];          // { x, y, sprite, hp, points, speed, color, active }
let bonusDrops = [];        // { x, y, type, value }
let explosions = [];
let wave = 0;
let totalWaves = 5;
let waveTimer = 0;
let spawnTimer = 0;
let spawnInterval = 0;
let invadersToSpawn = 0;
let invadersKilledThisWave = 0;
let countdownTime = 0;
let countdownNum = 0;
let waveEndTimer = 0;

// Bonus types
const BONUS_TYPES = [
  { char: "+", color: C.green,   name: "HP",    effect: "hp" },
  { char: "x", color: C.yellow,  name: "2X",    effect: "double" },
  { char: "!", color: C.red,     name: "RAPID", effect: "rapid" },
  { char: "*", color: C.magenta, name: "STEAL", effect: "steal" },
];

function createPlayer(index) {
  const cfg = PLAYER_CONFIGS[index];
  const spacing = COLS / (numPlayers + 1);
  return {
    index,
    name: cfg.name,
    color: cfg.color,
    ship: cfg.ship,
    x: spacing * (index + 1) - SHIP_W / 2,
    y: ROWS - 3,
    hp: 10,
    maxHp: 10,
    score: 0,
    kills: 0,
    alive: true,
    lastFire: 0,
    fireCooldown: 0.15,
    bulletColor: cfg.color,
    leftKey: cfg.left,
    rightKey: cfg.right,
    fireKey: cfg.fire,
    powerup: null,        // active powerup
    powerupTimer: 0,
    combo: 0,
    lastKillTime: 0,
  };
}

function spawnInvader() {
  const sprite = SPRITES_POOL[Math.floor(Math.random() * SPRITES_POOL.length)];
  const row = Math.floor(Math.random() * 3);  // row type for color/points
  const x = 2 + Math.random() * (COLS - 6);
  const baseSpeed = 0.02 + wave * 0.005;
  const speed = baseSpeed + Math.random() * 0.02;
  const wobble = (Math.random() - 0.5) * 0.05;
  const colors = [C.white, C.cyan, C.yellow];
  const points = [30, 20, 10];
  invaders.push({
    x, y: -1,
    sprite,
    hp: 1 + Math.floor(wave / 3),
    maxHp: 1 + Math.floor(wave / 3),
    points: points[row],
    speed,
    wobble,
    wobblePhase: Math.random() * Math.PI * 2,
    color: colors[row],
    active: true,
  });
}

function startSetup() {
  state = "setup";
}

function startCountdown() {
  state = "countdown";
  countdownTime = now();
  countdownNum = 3;
  wave = 0;
  players = [];
  if (netMode === "host") {
    // Host is P1 with their local keys, remote players get assigned indices
    const hostP = createPlayer(0);
    hostP.index = 0;
    players.push(hostP);
    for (const peer of netHostPcs) {
      if (peer.ready) {
        const p = createPlayer(peer.id);
        p.index = peer.id;
        players.push(p);
      }
    }
    numPlayers = players.length;
  } else if (numPlayers === 1) {
    const p = createPlayer(soloScheme);
    p.index = 0;
    p.name = "P1";
    players.push(p);
  } else {
    for (let i = 0; i < numPlayers; i++) players.push(createPlayer(i));
  }
  bullets = [];
  invaders = [];
  bonusDrops = [];
  explosions = [];
  enemyBullets = [];
}

function startWave() {
  wave++;
  state = "playing";
  bullets = [];
  invaders = [];
  bonusDrops = [];
  enemyBullets = [];
  lastEnemyShot = now();
  // More invaders each wave, spawned over time
  invadersToSpawn = 15 + wave * 8;
  invadersKilledThisWave = 0;
  spawnInterval = Math.max(0.15, 0.6 - wave * 0.06);
  spawnTimer = now();
  waveTimer = now();
  // Reset player positions
  const spacing = COLS / (numPlayers + 1);
  for (let i = 0; i < players.length; i++) {
    const p = players[i];
    p.x = spacing * (i + 1) - SHIP_W / 2;
    if (p.hp <= 0) { p.hp = 0; p.alive = false; }
    p.combo = 0;
  }
  sfx.waveStart();
}

function endWave() {
  state = "waveEnd";
  waveEndTimer = now();
  sfx.roundEnd();
}

// --- Update ---
function update() {
  const t = now();

  if (state === "title") {
    if (consumePress("Space") || consumePress("Enter")) { ensureAudio(); startSetup(); }
    if (consumePress("KeyH")) { startNetHost(); }
    if (consumePress("KeyJ")) { startNetClient(); }
    clearPresses();
    return;
  }
  if (state === "netLobby" || state === "netClientWait") {
    clearPresses();
    return;
  }

  if (state === "setup") {
    if (consumePress("ArrowLeft") || consumePress("KeyA")) {
      if (numPlayers === 1) { soloScheme = (soloScheme + 3) % 4; }
      else { numPlayers = Math.max(1, numPlayers - 1); }
    }
    if (consumePress("ArrowRight") || consumePress("KeyD")) {
      if (numPlayers === 1) { soloScheme = (soloScheme + 1) % 4; }
      else { numPlayers = Math.min(4, numPlayers + 1); }
    }
    if (consumePress("ArrowUp") || consumePress("KeyW")) numPlayers = Math.min(4, numPlayers + 1);
    if (consumePress("ArrowDown") || consumePress("KeyS")) numPlayers = Math.max(1, numPlayers - 1);
    if (consumePress("Space") || consumePress("Enter")) startCountdown();
    if (consumePress("Escape")) state = "title";
    if (consumePress("KeyM")) soundEnabled = !soundEnabled;
    clearPresses();
    return;
  }

  if (state === "countdown") {
    const elapsed = t - countdownTime;
    const newNum = 3 - Math.floor(elapsed);
    if (newNum !== countdownNum && newNum >= 0) {
      countdownNum = newNum;
      if (countdownNum > 0) sfx.countdown();
      else sfx.countdownGo();
    }
    if (elapsed >= 3.5) startWave();
    clearPresses();
    return;
  }

  if (state === "waveEnd") {
    if (t - waveEndTimer >= 3) {
      if (wave >= totalWaves || players.every(p => !p.alive)) {
        state = "results";
      } else {
        startWave();
      }
    }
    clearPresses();
    return;
  }

  if (state === "results") {
    if (consumePress("Space") || consumePress("Enter")) state = "title";
    if (consumePress("KeyR")) startCountdown();
    clearPresses();
    return;
  }

  // --- Playing ---
  if (consumePress("KeyM")) soundEnabled = !soundEnabled;
  clearPresses();

  // Player input & movement
  for (const p of players) {
    if (!p.alive) continue;

    if (keys[p.leftKey]) p.x = Math.max(0, p.x - 0.45);
    if (keys[p.rightKey]) p.x = Math.min(COLS - SHIP_W - 1, p.x + 0.45);

    // Powerup expiry
    if (p.powerup && t > p.powerupTimer) p.powerup = null;

    const cd = p.powerup === "rapid" ? 0.06 : p.fireCooldown;
    if (keys[p.fireKey] && t - p.lastFire >= cd) {
      const bx = Math.round(p.x) + Math.floor(SHIP_W / 2);
      bullets.push({ x: bx, y: p.y - 1, owner: p.index, color: p.color });
      sfx.shoot();
      p.lastFire = t;
    }
  }

  // Spawn invaders
  if (invadersToSpawn > 0 && t - spawnTimer >= spawnInterval) {
    spawnTimer = t;
    spawnInvader();
    invadersToSpawn--;
  }

  // Move bullets up
  bullets = bullets.filter(b => { b.y -= 0.6; return b.y >= 0; });

  // Move invaders down with wobble
  for (const inv of invaders) {
    if (!inv.active) continue;
    inv.y += inv.speed;
    inv.wobblePhase += 0.1;
    inv.x += Math.sin(inv.wobblePhase) * inv.wobble;
    inv.x = Math.max(0, Math.min(COLS - INV_W, inv.x));
  }

  // Move bonus drops
  bonusDrops = bonusDrops.filter(bd => {
    bd.y += 0.15;
    return bd.y < ROWS;
  });

  // Invader shooting (random, not aimed)
  const shotInterval = Math.max(0.3, 1.2 - wave * 0.1);
  if (t - lastEnemyShot >= shotInterval) {
    lastEnemyShot = t;
    const shooters = invaders.filter(inv => inv.active && inv.y > 2 && inv.y < ROWS - 5);
    if (shooters.length > 0) {
      const shooter = shooters[Math.floor(Math.random() * shooters.length)];
      enemyBullets.push({ x: Math.round(shooter.x) + Math.floor(INV_W / 2), y: shooter.y + 1 });
    }
  }

  // Move enemy bullets down
  enemyBullets = enemyBullets.filter(b => { b.y += 0.25; return b.y < ROWS; });

  // Enemy bullets vs invaders (friendly fire!)
  for (let bi = enemyBullets.length - 1; bi >= 0; bi--) {
    const b = enemyBullets[bi];
    for (const inv of invaders) {
      if (!inv.active) continue;
      const ix = Math.round(inv.x), iy = Math.round(inv.y);
      if (b.x >= ix && b.x <= ix + INV_W && Math.round(b.y) >= iy - 1 && Math.round(b.y) <= iy) {
        inv.hp--;
        enemyBullets.splice(bi, 1);
        if (inv.hp <= 0) {
          inv.active = false;
          explosions.push({ x: ix, y: iy, frame: 0, color: C.red });
          sfx.kill(1);
        }
        break;
      }
    }
  }

  // Enemy bullets vs players
  for (let bi = enemyBullets.length - 1; bi >= 0; bi--) {
    const b = enemyBullets[bi];
    for (const p of players) {
      if (!p.alive) continue;
      const px = Math.round(p.x);
      if (Math.round(b.y) >= p.y - 1 && Math.round(b.y) <= p.y && b.x >= px && b.x <= px + SHIP_W) {
        p.hp -= 3;
        explosions.push({ x: px, y: p.y, frame: 0, color: C.red });
        sfx.playerHit();
        enemyBullets.splice(bi, 1);
        if (p.hp <= 0) { p.hp = 0; p.alive = false; }
        break;
      }
    }
  }

  // Explosions
  explosions = explosions.filter(e => { e.frame++; return e.frame < 8; });

  // Collision: bullets vs invaders
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    for (let ii = invaders.length - 1; ii >= 0; ii--) {
      const inv = invaders[ii];
      if (!inv.active) continue;
      const ix = Math.round(inv.x), iy = Math.round(inv.y);
      if (b.x >= ix && b.x <= ix + INV_W && Math.round(b.y) >= iy - 1 && Math.round(b.y) <= iy) {
        inv.hp--;
        bullets.splice(bi, 1);
        if (inv.hp <= 0) {
          inv.active = false;
          const p = players[b.owner];
          let pts = inv.points;
          // Combo system
          if (t - p.lastKillTime < 1.5) { p.combo = Math.min(p.combo + 1, 10); }
          else { p.combo = 1; }
          p.lastKillTime = t;
          pts *= (p.powerup === "double" ? 2 : 1);
          pts += (p.combo - 1) * 5;  // combo bonus

          // Steal powerup: steal 10% of richest opponent's score
          if (p.powerup === "steal") {
            let richest = null;
            for (const op of players) {
              if (op.index !== p.index && op.alive && (!richest || op.score > richest.score)) richest = op;
            }
            if (richest && richest.score > 0) {
              const stolen = Math.ceil(richest.score * 0.03);
              richest.score -= stolen;
              pts += stolen;
              sfx.steal();
            }
          }

          p.score += pts;
          p.kills++;
          invadersKilledThisWave++;
          explosions.push({ x: ix, y: iy, frame: 0, color: p.color });
          sfx.kill(inv.points / 10);

          // Random bonus drop
          if (Math.random() < 0.12) {
            const bt = BONUS_TYPES[Math.floor(Math.random() * BONUS_TYPES.length)];
            bonusDrops.push({ x: ix + INV_W / 2, y: iy, ...bt });
            sfx.bonusDrop();
          }
        }
        break;
      }
    }
  }

  // Collision: bonus drops vs players
  for (let bi = bonusDrops.length - 1; bi >= 0; bi--) {
    const bd = bonusDrops[bi];
    for (const p of players) {
      if (!p.alive) continue;
      const px = Math.round(p.x);
      if (Math.round(bd.y) >= p.y - 1 && Math.round(bd.y) <= p.y && bd.x >= px && bd.x <= px + SHIP_W) {
        if (bd.effect === "hp") {
          p.hp = Math.min(p.maxHp, p.hp + 3);
        } else {
          p.powerup = bd.effect;
          p.powerupTimer = t + 6;
        }
        sfx.bonusGrab();
        bonusDrops.splice(bi, 1);
        break;
      }
    }
  }

  // Invaders reaching bottom = damage to nearest player
  for (const inv of invaders) {
    if (!inv.active) continue;
    if (inv.y >= ROWS - 2) {
      inv.active = false;
      // Damage closest alive player
      let closest = null, minDist = Infinity;
      for (const p of players) {
        if (!p.alive) continue;
        const d = Math.abs(p.x + SHIP_W / 2 - inv.x - INV_W / 2);
        if (d < minDist) { minDist = d; closest = p; }
      }
      if (closest) {
        closest.hp -= 2;
        explosions.push({ x: Math.round(closest.x), y: closest.y, frame: 0, color: C.red });
        sfx.playerHit();
        if (closest.hp <= 0) { closest.hp = 0; closest.alive = false; }
      }
    }
  }

  // Clean dead invaders
  invaders = invaders.filter(inv => inv.active && inv.y < ROWS);

  // Wave end check: all spawned and all dead/offscreen
  if (invadersToSpawn <= 0 && invaders.filter(i => i.active).length === 0) {
    endWave();
  }

  // All players dead
  if (players.every(p => !p.alive)) {
    endWave();
  }
}

// --- Draw ---
function draw() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (state === "title") { drawTitle(); return; }
  if (state === "setup") { drawSetup(); return; }
  if (state === "countdown") { drawCountdown(); return; }
  if (state === "results") { drawResults(); return; }

  drawGame();
  if (state === "waveEnd") drawWaveEnd();
}

function drawTitle() {
  const title = [
    "  ____                        ____            _                    ",
    " / ___| _ __   __ _  ___ ___ | __ )  __ _ ___| |__   ___ _ __ ___ ",
    " \\___ \\| '_ \\ / _` |/ __/ _ \\|  _ \\ / _` / __| '_ \\ / _ \\ '__/ __|",
    "  ___) | |_) | (_| | (_|  __/| |_) | (_| \\__ \\ | | |  __/ |  \\__ \\",
    " |____/| .__/ \\__,_|\\___\\___||____/ \\__,_|___/_| |_|\\___|_|  |___/",
    "       |_|                                                         ",
  ];
  const cy = Math.floor(ROWS / 2) - 10;
  title.forEach((line, i) => drawTextCentered(line, cy + i, C.green, true));

  drawTextCentered("HUNGRY  HUNGRY  HIPPOS  EDITION", cy + 7, C.magenta, true);

  const inst = [
    "",
    "1-4 Players  |  Local or Network  |  Most Kills Wins",
    "",
    "P1: A/D + W          P2: Arrows + Up",

    "",
    "Grab powerups:  + HP   x 2X   ! RAPID   * STEAL",
    "",

  ];
  inst.forEach((line, i) => {
    let color = C.white;
    if (i === 0) color = C.dim;
    if (i === inst.length - 1) color = C.yellow;
    if (line.includes("P1:")) {
      // Draw player controls in their colors
      const y = cy + title.length + i + 1;
      const x = Math.floor((COLS - line.length) / 2);
      drawText("P1: A/D + W", x, y, C.green, true);
      drawText("P2: Arrows + Up", x + 21, y, C.cyan, true);
      return;
    }
    if (line.includes("P3:")) {
      const y = cy + title.length + i + 1;

      drawText("P4: Numpad 4/6/8", x + 21, y, C.magenta, true);
      return;
    }
    drawTextCentered(line, cy + title.length + i + 1, color);
  });
}

function drawSetup() {
  const cy = Math.floor(ROWS / 2);
  drawTextCentered("HOW MANY PLAYERS?", cy - 5, C.white, true);
  drawTextCentered("Up/Down to change players", cy - 3, C.dim);

  if (numPlayers === 1) {
    // Solo mode: show control scheme picker
    drawTextCentered(`< ${numPlayers} Player - SOLO >`, cy - 1, C.yellow, true);

    const schemeLabels = ["A/D + W", "Arrows + Up", "J/L + I", "Numpad 4/6/8"];
    const cfg = PLAYER_CONFIGS[soloScheme];
    drawText(cfg.ship, Math.floor(COLS / 2) - 3, cy + 1, cfg.color, true);
    drawTextCentered(`< ${schemeLabels[soloScheme]} >`, cy + 3, cfg.color, true);
    drawTextCentered("Left/Right to pick controls", cy + 5, C.dim);
  } else {
    drawTextCentered(`< ${numPlayers} Players >`, cy - 1, C.yellow, true);

    for (let i = 0; i < 4; i++) {
      const active = i < numPlayers;
      const cfg = PLAYER_CONFIGS[i];
      const col = Math.floor(COLS / 2) - 16 + i * 10;
      drawText(cfg.ship, col, cy + 1, active ? cfg.color : C.dim, active);
      drawText(cfg.name, col + 1, cy + 2, active ? cfg.color : C.dim, active);
    }
  }

  drawTextCentered("SPACE to start", cy + 7, C.yellow);
  const snd = soundEnabled ? "ON" : "OFF";
  drawTextCentered(`M: Sound ${snd}  |  ESC: Back`, cy + 9, C.dim);
}

function drawCountdown() {
  const t = now();
  const elapsed = t - countdownTime;
  const num = 3 - Math.floor(elapsed);

  // Draw player positions preview
  for (const p of players) {
    drawText(p.ship, Math.round(p.x), p.y, p.color, true);
    drawText(p.name, Math.round(p.x) + 1, p.y + 1, p.color);
  }

  if (num > 0) {
    drawTextCentered(`${num}`, Math.floor(ROWS / 2), C.white, true);
  } else {
    drawTextCentered("GO!", Math.floor(ROWS / 2), C.yellow, true);
  }
  drawTextCentered(`Wave ${wave + 1} of ${totalWaves}`, Math.floor(ROWS / 2) + 2, C.dim);
}

function drawGame() {
  // HUD - score bar for each player
  drawText("\u2500".repeat(COLS), 0, 0.7, C.dim);
  const segW = Math.floor(COLS / numPlayers);
  for (let i = 0; i < players.length; i++) {
    const p = players[i];
    const sx = i * segW + 1;

    // Name and score
    const info = `${p.name}: ${p.score}`;
    drawText(info, sx, 0, p.alive ? p.color : C.dim, true);

    // HP bar
    const filled = Math.max(0, Math.round((p.hp / p.maxHp) * 6));
    const hpBar = "\u2588".repeat(filled) + "\u2591".repeat(6 - filled);
    const hpColor = p.hp > 6 ? C.green : p.hp > 3 ? C.yellow : C.red;
    drawText("[", sx + info.length + 1, 0, C.dim);
    drawText(hpBar, sx + info.length + 2, 0, p.alive ? hpColor : C.dim);
    drawText("]", sx + info.length + 8, 0, C.dim);

    // Powerup indicator
    if (p.powerup) {
      const pChar = p.powerup === "double" ? "x2" : p.powerup === "rapid" ? "!!" : p.powerup === "steal" ? "$$" : "";
      drawText(pChar, sx + info.length + 10, 0, C.magenta, true);
    }

    // Combo
    if (p.combo > 1 && now() - p.lastKillTime < 1.5) {
      drawText(`${p.combo}x`, sx + info.length + 13, 0, C.yellow, true);
    }
  }

  // Wave info
  const waveInfo = `Wave ${wave}/${totalWaves}`;
  const snd = soundEnabled ? "ON" : "OFF";
  drawText(`${waveInfo}  Sound:${snd}`, COLS - waveInfo.length - 11, 0, C.dim);

  // Invaders
  for (const inv of invaders) {
    if (!inv.active) continue;
    const ix = Math.round(inv.x), iy = Math.round(inv.y);
    if (iy < 1 || iy >= ROWS) continue;
    // Show damage: dim color if hurt
    let col = inv.color;
    if (inv.hp < inv.maxHp) {
      // Blend toward red
      col = inv.hp <= 1 ? C.red : inv.color;
    }
    drawText(inv.sprite, ix, iy, col, inv.hp === inv.maxHp);
    // HP pips for multi-hit invaders
    if (inv.maxHp > 1) {
      const pips = ".".repeat(inv.hp);
      drawText(pips, ix, iy - 0.4, C.dim);
    }
  }

  // Bonus drops (pulsing)
  for (const bd of bonusDrops) {
    const pulse = Math.sin(now() * 8) > 0;
    if (pulse) drawText(bd.char, Math.round(bd.x), Math.round(bd.y), bd.color, true);
    else drawText(bd.char, Math.round(bd.x), Math.round(bd.y), C.white, true);
  }

  // Players
  for (const p of players) {
    if (!p.alive) {
      drawText("XXXXX", Math.round(p.x), p.y, C.dim);
      continue;
    }
    drawText(p.ship, Math.round(p.x), p.y, p.color, true);
    // Flash on powerup
    if (p.powerup && Math.sin(now() * 12) > 0) {
      drawText(p.ship, Math.round(p.x), p.y, C.white, true);
    }
  }

  // Bullets
  for (const b of bullets) {
    drawText("|", Math.round(b.x), Math.round(b.y), b.color, true);
  }
  for (const b of enemyBullets) {
    drawText("!", Math.round(b.x), Math.round(b.y), C.red, true);
  }

  // Explosions
  const boom = ["*", "\\*/", " . "];
  for (const e of explosions) {
    const f = Math.min(Math.floor(e.frame / 2), boom.length - 1);
    drawText(boom[f], e.x, e.y, e.color || C.red, true);
  }
}

function drawWaveEnd() {
  drawRect(Math.floor(COLS/2) - 16, Math.floor(ROWS/2) - 3, 32, 7, "rgba(0,0,0,0.85)");
  if (wave >= totalWaves || players.every(p => !p.alive)) {
    drawTextCentered("FINAL ROUND COMPLETE!", Math.floor(ROWS/2) - 2, C.yellow, true);
  } else {
    drawTextCentered(`Wave ${wave} Complete!`, Math.floor(ROWS/2) - 2, C.yellow, true);
  }

  // Mini scoreboard
  const sorted = [...players].sort((a, b) => b.score - a.score);
  sorted.forEach((p, i) => {
    const medal = i === 0 ? ">> " : "   ";
    const line = `${medal}${p.name}: ${p.score} (${p.kills} kills)`;
    drawTextCentered(line, Math.floor(ROWS/2) + i, p.color, i === 0);
  });
}

function drawResults() {
  drawTextCentered("GAME OVER", Math.floor(ROWS/2) - 8, C.red, true);

  const sorted = [...players].sort((a, b) => b.score - a.score);
  const winner = sorted[0];

  drawTextCentered(`${winner.name} WINS!`, Math.floor(ROWS/2) - 5, winner.color, true);

  // Scoreboard
  drawTextCentered("FINAL SCORES", Math.floor(ROWS/2) - 3, C.white, true);
  drawTextCentered("\u2500".repeat(36), Math.floor(ROWS/2) - 2, C.dim);
  sorted.forEach((p, i) => {
    const rank = ["1st", "2nd", "3rd", "4th"][i];
    const bar = "\u2588".repeat(Math.max(1, Math.round((p.score / Math.max(1, winner.score)) * 20)));
    const line = ` ${rank}  ${p.name}  ${String(p.score).padStart(6)}  ${bar}  (${p.kills} kills)`;
    drawTextCentered(line, Math.floor(ROWS/2) - 1 + i * 2, p.color, i === 0);
  });

  drawTextCentered("SPACE: Menu  |  R: Rematch", Math.floor(ROWS/2) + sorted.length * 2 + 2, C.yellow);
}

// ─── WebRTC Networking ───────────────────────────────────────────────────────

const ICE_SERVERS = [{ urls: "stun:stun.l.google.com:19302" }];

function compressSDP(sdp) {
  // Strip unnecessary lines and base64 encode
  const stripped = JSON.stringify(sdp);
  return btoa(unescape(encodeURIComponent(stripped)));
}

function decompressSDP(code) {
  try {
    const json = decodeURIComponent(escape(atob(code.trim())));
    return JSON.parse(json);
  } catch(e) { return null; }
}

const overlay = document.getElementById("sdp-overlay");
const sdpOut = document.getElementById("sdp-out");
const sdpIn = document.getElementById("sdp-in");
const sdpStatus = document.getElementById("sdp-status");
const sdpTitle = document.getElementById("sdp-title");
const sdpDesc = document.getElementById("sdp-desc");
const sdpPasteLabel = document.getElementById("sdp-paste-label");
const sdpCopyBtn = document.getElementById("sdp-copy");
const sdpConnectBtn = document.getElementById("sdp-connect");

function showOverlay() { overlay.classList.add("active"); canvas.style.display = "none"; }
function hideOverlay() { overlay.classList.remove("active"); canvas.style.display = ""; sdpIn.value = ""; sdpOut.value = ""; sdpStatus.textContent = ""; }

function copyCode() {
  sdpOut.select();
  navigator.clipboard.writeText(sdpOut.value).then(() => {
    sdpStatus.textContent = "Copied to clipboard!";
    sdpStatus.className = "status";
  });
}

function cancelNet() {
  hideOverlay();
  cleanupNet();
  state = "title";
}

function cleanupNet() {
  if (netSnapInterval) { clearInterval(netSnapInterval); netSnapInterval = null; }
  netHostPcs.forEach(p => { try { p.pc.close(); } catch(e){} });
  if (netPc) { try { netPc.close(); } catch(e){} }
  netPeers = []; netHostPcs = []; netPc = null;
  netMode = null; netRemoteInputs = {}; netLatestSnap = null; netConnectedCount = 0;
}

// --- Host Flow ---
async function startNetHost() {
  ensureAudio();
  cleanupNet();
  netMode = "host";
  netMyId = 0;
  state = "netLobby";

  // Create first offer for a client
  await createHostOffer();
}

async function createHostOffer() {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  const dc = pc.createDataChannel("game", { ordered: false, maxRetransmits: 0 });
  const peerId = netHostPcs.length + 1;

  const peer = { pc, dc, id: peerId, ready: false };
  netHostPcs.push(peer);

  dc.onopen = () => {
    peer.ready = true;
    netConnectedCount++;
    dc.send(JSON.stringify({ t: "assign", id: peerId, name: PLAYER_CONFIGS[peerId].name }));
    sdpStatus.textContent = `Player ${peerId + 1} connected! ${netConnectedCount + 1} players total.`;
    // If more room, prep next offer prompt
    if (netHostPcs.length < 3) {
      sdpDesc.textContent = `Player ${peerId + 1} connected. Share a new code for another player, or close this to start.`;
    }
  };

  dc.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.t === "input") {
        netRemoteInputs[peerId] = { l: msg.l, r: msg.r, f: msg.f };
      }
    } catch(err) {}
  };

  dc.onclose = () => {
    peer.ready = false;
    netConnectedCount = netHostPcs.filter(p => p.ready).length;
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  // Wait for ICE gathering
  await new Promise(resolve => {
    if (pc.iceGatheringState === "complete") return resolve();
    pc.onicecandidate = e => { if (!e.candidate) resolve(); };
    setTimeout(resolve, 3000);
  });

  const code = compressSDP(pc.localDescription);
  sdpTitle.textContent = `HOST - Share this code with Player ${peerId + 1}`;
  sdpDesc.textContent = "Copy the code below and send it to the other player. Then paste their response code and click Connect.";
  sdpOut.value = code;
  sdpPasteLabel.textContent = `Paste Player ${peerId + 1}'s response code:`;
  sdpIn.value = "";
  sdpConnectBtn.textContent = "Connect";
  sdpConnectBtn.onclick = () => submitHostAnswer(peer);
  showOverlay();
}

async function submitHostAnswer(peer) {
  const answerCode = sdpIn.value.trim();
  if (!answerCode) { sdpStatus.textContent = "Paste the response code first!"; sdpStatus.className = "status error"; return; }
  const answer = decompressSDP(answerCode);
  if (!answer) { sdpStatus.textContent = "Invalid code!"; sdpStatus.className = "status error"; return; }
  try {
    await peer.pc.setRemoteDescription(answer);
    sdpStatus.textContent = "Connecting...";
    sdpStatus.className = "status";
    // Wait for connection
    setTimeout(() => {
      if (peer.ready) {
        if (netHostPcs.length < 3) {
          sdpStatus.textContent = "Connected! Click 'Add Player' for another, or 'Start Game' to begin.";
          sdpConnectBtn.textContent = "Add Player";
          sdpConnectBtn.onclick = () => createHostOffer();
          // Add a start button
          const startBtn = document.createElement("button");
          startBtn.textContent = "Start Game";
          startBtn.onclick = () => { hideOverlay(); hostStartGame(); };
          startBtn.id = "sdp-start";
          if (!document.getElementById("sdp-start")) {
            sdpConnectBtn.parentElement.appendChild(startBtn);
          }
        } else {
          hideOverlay();
          hostStartGame();
        }
      } else {
        sdpStatus.textContent = "Connection failed. Try again.";
        sdpStatus.className = "status error";
      }
    }, 2000);
  } catch(e) {
    sdpStatus.textContent = "Failed: " + e.message;
    sdpStatus.className = "status error";
  }
}

function hostStartGame() {
  // Remove temp start button
  const sb = document.getElementById("sdp-start");
  if (sb) sb.remove();
  hideOverlay();

  numPlayers = 1 + netHostPcs.filter(p => p.ready).length;
  state = "setup";

  // Override startCountdown to include network players
  const origCountdown = startCountdown;

  // Start broadcasting state
  netSnapInterval = setInterval(() => {
    if (netMode !== "host") return;
    const snap = buildSnapshot();
    const msg = JSON.stringify(snap);
    netHostPcs.forEach(p => {
      if (p.ready && p.dc.readyState === "open") {
        try { p.dc.send(msg); } catch(e) {}
      }
    });
  }, 50); // 20Hz
}

function buildSnapshot() {
  return {
    t: "state", st: state, wave, tw: totalWaves,
    players: players.map(p => ({
      index: p.index, name: p.name, color: colorToName(p.color),
      ship: p.ship, x: Math.round(p.x * 10) / 10, y: p.y,
      hp: p.hp, maxHp: p.maxHp, score: p.score, kills: p.kills,
      alive: p.alive, powerup: p.powerup,
      combo: p.combo, lastKillTime: p.lastKillTime,
    })),
    invaders: invaders.filter(i => i.active).map(i => ({
      x: Math.round(i.x * 10) / 10, y: Math.round(i.y * 10) / 10,
      sprite: i.sprite, hp: i.hp, maxHp: i.maxHp, color: colorToName(i.color),
    })),
    bullets: bullets.map(b => ({
      x: Math.round(b.x), y: Math.round(b.y * 10) / 10,
      owner: b.owner, color: colorToName(b.color),
    })),
    enemyBullets: enemyBullets.map(b => ({
      x: Math.round(b.x), y: Math.round(b.y * 10) / 10,
    })),
    bonuses: bonusDrops.map(b => ({
      x: Math.round(b.x), y: Math.round(b.y * 10) / 10,
      char: b.char, color: colorToName(b.color),
    })),
    explosions: explosions.map(e => ({
      x: e.x, y: e.y, frame: e.frame, color: colorToName(e.color),
    })),
    cn: countdownNum,
  };
}

function colorToName(c) {
  for (const [name, val] of Object.entries(C)) { if (val === c) return name; }
  return "white";
}
function nameToColor(n) { return C[n] || C.white; }

// --- Client Flow ---
async function startNetClient() {
  ensureAudio();
  cleanupNet();
  netMode = "client";
  state = "netLobby";

  sdpTitle.textContent = "JOIN - Paste the host's code";
  sdpDesc.textContent = "Paste the code you received from the host, then click Connect.";
  sdpOut.value = "";
  sdpPasteLabel.textContent = "Host's code:";
  sdpIn.value = "";
  sdpCopyBtn.style.display = "none";
  document.getElementById("sdp-out").style.display = "none";
  sdpConnectBtn.textContent = "Connect";
  sdpConnectBtn.onclick = submitClientOffer;
  showOverlay();
}

async function submitClientOffer() {
  const offerCode = sdpIn.value.trim();
  if (!offerCode) { sdpStatus.textContent = "Paste the host's code first!"; sdpStatus.className = "status error"; return; }
  const offer = decompressSDP(offerCode);
  if (!offer) { sdpStatus.textContent = "Invalid code!"; sdpStatus.className = "status error"; return; }

  netPc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  netPc.ondatachannel = (e) => {
    const dc = e.channel;
    netPeers = [dc];
    dc.onopen = () => {
      sdpStatus.textContent = "Connected! Waiting for host to start...";
    };
    dc.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.t === "state") {
          netLatestSnap = msg;
        } else if (msg.t === "assign") {
          netMyId = msg.id;
        }
      } catch(err) {}
    };
    dc.onclose = () => {
      netLatestSnap = null;
      state = "title";
      cleanupNet();
    };
  };

  try {
    await netPc.setRemoteDescription(offer);
    const answer = await netPc.createAnswer();
    await netPc.setLocalDescription(answer);

    await new Promise(resolve => {
      if (netPc.iceGatheringState === "complete") return resolve();
      netPc.onicecandidate = e => { if (!e.candidate) resolve(); };
      setTimeout(resolve, 3000);
    });

    const code = compressSDP(netPc.localDescription);
    // Show answer code
    document.getElementById("sdp-out").style.display = "";
    sdpCopyBtn.style.display = "";
    sdpOut.value = code;
    sdpTitle.textContent = "JOIN - Send this code back to the host";
    sdpDesc.textContent = "Copy the code below and send it back to the host. Connection will establish automatically.";
    sdpPasteLabel.textContent = "";
    sdpIn.style.display = "none";
    sdpConnectBtn.style.display = "none";

    // Wait for data channel
    const waitForDc = setInterval(() => {
      if (netPeers.length > 0 && netPeers[0].readyState === "open") {
        clearInterval(waitForDc);
        hideOverlay();
        sdpIn.style.display = "";
        sdpConnectBtn.style.display = "";
        sdpCopyBtn.style.display = "";
        document.getElementById("sdp-out").style.display = "";
        state = "netClientWait";
        // Start sending input
        setInterval(() => {
          if (netMode !== "client" || !netPeers[0] || netPeers[0].readyState !== "open") return;
          // Use P1 controls since client picks in setup — use all common keys
          const inp = {
            t: "input",
            l: keys["ArrowLeft"] || keys["KeyA"] || keys["KeyJ"] || keys["Numpad4"],
            r: keys["ArrowRight"] || keys["KeyD"] || keys["KeyL"] || keys["Numpad6"],
            f: keys["ArrowUp"] || keys["KeyW"] || keys["KeyI"] || keys["Numpad8"] || keys["Space"],
          };
          try { netPeers[0].send(JSON.stringify(inp)); } catch(e) {}
        }, 50);
      }
    }, 100);
  } catch(e) {
    sdpStatus.textContent = "Failed: " + e.message;
    sdpStatus.className = "status error";
  }
}

// ─── Network-aware update/draw patches ───────────────────────────────────────

// Patch update: if host, apply remote inputs; if client, skip sim
const _origUpdate = update;
function netUpdate() {
  if (netMode === "host") {
    // Apply remote inputs to their players
    for (const [id, inp] of Object.entries(netRemoteInputs)) {
      const pid = parseInt(id);
      const p = players.find(pl => pl.index === pid);
      if (p && p.alive) {
        const t = now();
        if (inp.l) p.x = Math.max(0, p.x - 0.45);
        if (inp.r) p.x = Math.min(COLS - SHIP_W - 1, p.x + 0.45);
        const cd = p.powerup === "rapid" ? 0.06 : p.fireCooldown;
        if (inp.f && t - p.lastFire >= cd) {
          const bx = Math.round(p.x) + Math.floor(SHIP_W / 2);
          bullets.push({ x: bx, y: p.y - 1, owner: p.index, color: p.color });
          p.lastFire = t;
        }
      }
    }
    _origUpdate();
  } else if (netMode === "client") {
    // Client: don't run sim, just render latest snapshot
    if (state === "netClientWait") {
      // waiting
    }
    clearPresses();
  } else {
    _origUpdate();
  }
}

function netDraw() {
  if (netMode === "client" && netLatestSnap) {
    drawClientState(netLatestSnap);
    return;
  }
  if (netMode === "client" && !netLatestSnap) {
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawTextCentered("Connected. Waiting for host to start...", Math.floor(ROWS/2), C.yellow);
    return;
  }
  draw();
}

function drawClientState(snap) {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const st = snap.st;

  if (st === "playing" || st === "waveEnd" || st === "results") {
    // HUD
    drawText("\u2500".repeat(COLS), 0, 0.7, C.dim);
    const np = snap.players.length;
    const segW = Math.floor(COLS / Math.max(1, np));
    for (let i = 0; i < snap.players.length; i++) {
      const p = snap.players[i];
      const sx = i * segW + 1;
      const pc = nameToColor(p.color);
      const info = `${p.name}: ${p.score}`;
      drawText(info, sx, 0, p.alive ? pc : C.dim, true);
      const filled = Math.max(0, Math.round((p.hp / Math.max(1, p.maxHp)) * 6));
      const hpBar = "\u2588".repeat(filled) + "\u2591".repeat(6 - filled);
      const hpColor = p.hp > 6 ? C.green : p.hp > 3 ? C.yellow : C.red;
      drawText("[", sx + info.length + 1, 0, C.dim);
      drawText(hpBar, sx + info.length + 2, 0, p.alive ? hpColor : C.dim);
      drawText("]", sx + info.length + 8, 0, C.dim);
      if (p.powerup) {
        const labels = { double: "x2", rapid: "!!", steal: "$$" };
        drawText(labels[p.powerup] || "", sx + info.length + 10, 0, C.magenta, true);
      }
      if (p.combo > 1) drawText(`${p.combo}x`, sx + info.length + 13, 0, C.yellow, true);
    }
    const waveInfo = `Wave ${snap.wave}/${snap.tw}`;
    drawText(waveInfo, COLS - waveInfo.length - 2, 0, C.dim);

    // Invaders
    for (const inv of (snap.invaders || [])) {
      const ix = Math.round(inv.x), iy = Math.round(inv.y);
      if (iy < 1 || iy >= ROWS) continue;
      const col = inv.hp < inv.maxHp && inv.hp <= 1 ? C.red : nameToColor(inv.color);
      drawText(inv.sprite, ix, iy, col, inv.hp === inv.maxHp);
      if (inv.maxHp > 1) drawText(".".repeat(inv.hp), ix, iy - 0.4, C.dim);
    }

    // Bonuses
    const pulse = Math.sin(now() * 8) > 0;
    for (const bd of (snap.bonuses || [])) {
      drawText(bd.char, Math.round(bd.x), Math.round(bd.y), pulse ? nameToColor(bd.color) : C.white, true);
    }

    // Players
    const t = now();
    for (const p of (snap.players || [])) {
      const px = Math.round(p.x), py = p.y;
      const pc = nameToColor(p.color);
      if (!p.alive) { drawText("XXXXX", px, py, C.dim); continue; }
      let attr = pc;
      if (p.powerup && Math.sin(t * 12) > 0) attr = C.white;
      drawText(p.ship, px, py, attr, true);
      if (p.index === netMyId) drawText(`[${p.name}]`, px + 1, py + 1, pc);
    }

    // Bullets
    for (const b of (snap.bullets || [])) {
      drawText("|", Math.round(b.x), Math.round(b.y), nameToColor(b.color), true);
    }
    for (const b of (snap.enemyBullets || [])) {
      drawText("!", Math.round(b.x), Math.round(b.y), C.red, true);
    }

    // Explosions
    const boom = ["*", "\\*/", " . "];
    for (const e of (snap.explosions || [])) {
      const f = Math.min(Math.floor(e.frame / 2), boom.length - 1);
      drawText(boom[f], e.x, e.y, nameToColor(e.color) || C.red, true);
    }
  }

  if (st === "countdown") {
    for (const p of (snap.players || [])) {
      drawText(p.ship, Math.round(p.x), p.y, nameToColor(p.color), true);
      drawText(p.name, Math.round(p.x) + 1, p.y + 1, nameToColor(p.color));
    }
    const cn = snap.cn || 0;
    if (cn > 0) drawTextCentered(`${cn}`, Math.floor(ROWS/2), C.white, true);
    else drawTextCentered("GO!", Math.floor(ROWS/2), C.yellow, true);
    drawTextCentered(`Wave ${snap.wave + 1} of ${snap.tw}`, Math.floor(ROWS/2) + 2, C.dim);
  }

  if (st === "waveEnd") {
    drawRect(Math.floor(COLS/2) - 16, Math.floor(ROWS/2) - 3, 32, 7, "rgba(0,0,0,0.85)");
    const isFinal = snap.wave >= snap.tw || (snap.players || []).every(p => !p.alive);
    const msg = isFinal ? "FINAL ROUND COMPLETE!" : `Wave ${snap.wave} Complete!`;
    drawTextCentered(msg, Math.floor(ROWS/2) - 2, C.yellow, true);
    const sorted = [...(snap.players || [])].sort((a, b) => b.score - a.score);
    sorted.forEach((p, i) => {
      const medal = i === 0 ? ">> " : "   ";
      drawTextCentered(`${medal}${p.name}: ${p.score} (${p.kills} kills)`, Math.floor(ROWS/2) + i, nameToColor(p.color), i === 0);
    });
  }

  if (st === "results") {
    drawTextCentered("GAME OVER", Math.floor(ROWS/2) - 8, C.red, true);
    const sorted = [...(snap.players || [])].sort((a, b) => b.score - a.score);
    if (sorted[0]) drawTextCentered(`${sorted[0].name} WINS!`, Math.floor(ROWS/2) - 5, nameToColor(sorted[0].color), true);
    drawTextCentered("FINAL SCORES", Math.floor(ROWS/2) - 3, C.white, true);
    const top = Math.max(1, sorted[0]?.score || 1);
    sorted.forEach((p, i) => {
      const rank = ["1st","2nd","3rd","4th"][i];
      const bar = "\u2588".repeat(Math.max(1, Math.round((p.score / top) * 16)));
      drawTextCentered(` ${rank}  ${p.name}  ${String(p.score).padStart(6)}  ${bar}  (${p.kills} kills)`, Math.floor(ROWS/2) - 1 + i * 2, nameToColor(p.color), i === 0);
    });
    drawTextCentered("Host controls next round", Math.floor(ROWS/2) + sorted.length * 2 + 2, C.dim);
  }

  if (st === "setup") {
    drawTextCentered("Host is setting up the game...", Math.floor(ROWS/2), C.yellow);
  }
}

// --- Game Loop ---
function loop() {
  netUpdate();
  netDraw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
